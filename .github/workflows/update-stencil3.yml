on:
  workflow_dispatch:
  repository_dispatch:
    types: [update_stencil3]
  push:
    branches: ["main"]
    paths: [".github/workflows/update-stencil3.yml"]

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.arch }}
    strategy:
      matrix:
        arch: [ x86_64, aarch64 ]
      max-parallel: 1

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
      with:
        packages: pacman-package-manager libarchive-tools
        version: 1.0

    - run: |
        mkdir stencil3
        curl "https://github.com/MRT-Map/stencil3/raw/master/build/linux/PKGBUILD" -Lo stencil3/PKGBUILD

    - uses: iiiii7d/archlinux-package-action@fc72e5d53b81bfd29811a1dde55da89ae2f08a93 # main
      with:
        path: ${{ matrix.arch }}/stencil3
        flags: '-sr --noconfirm'
        namcap: false
        aur: true
      env:
        CARCH: ${{ matrix.arch }}

    - run: rm stencil3-*.pkg.tar.zst || true
    - run: mv stencil3/*.pkg.tar.zst .
    - run: repo-add -R arch-mrt-map.db.tar.gz *.pkg.tar.zst

    - run: sudo rm -r stencil3

    - run: echo "message=update @ $(date +%Y%m%dT%H:%M:%S%Z)" >> "$GITHUB_ENV"
    - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
      with:
        default_author: github_actions
        message: ${{ env.message }}
        pull: '--rebase --autostash'
