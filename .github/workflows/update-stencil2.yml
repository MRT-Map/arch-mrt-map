on:
  workflow_dispatch:
  repository_dispatch:
    types: [update_stencil2]
  push:
    branches: ["main"]
    paths: [".github/workflows/update-stencil2.yml"]

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: x86_64

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
      with:
        packages: pacman-package-manager libarchive-tools
        version: 1.0

    - run: |
        mkdir stencil2
        curl "https://github.com/MRT-Map/stencil2/raw/v2/build/linux/PKGBUILD" -Lo stencil2/PKGBUILD

    - uses: iiiii7d/archlinux-package-action@fc72e5d53b81bfd29811a1dde55da89ae2f08a93 # main
      with:
        path: x86_64/stencil2
        flags: '-sr --noconfirm'
        namcap: false
        aur: true

    - run: rm stencil2-*.pkg.tar.zst
    - run: mv stencil2/*.pkg.tar.zst .
    - run: repo-add -R arch-mrt-map.db.tar.gz *.pkg.tar.zst

    - run: sudo rm -r stencil2

    - run: echo "message=update @ $(date +%Y%m%dT%H:%M:%S%Z)" >> "$GITHUB_ENV"
    - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
      with:
        default_author: github_actions
        message: ${{ env.message }}
        pull: '--rebase --autostash'
